<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景渐变 -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1890ff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#52c41a" stop-opacity="0.9"/>
    </linearGradient>
  </defs>
  
  <!-- 圆形背景 -->
  <circle cx="256" cy="256" r="240" fill="url(#gradient)"/>
  
  <!-- 心形图标 -->
  <g transform="translate(256, 256) scale(2.5)">
    <path d="M 0 -12 
             C -8 -20, -20 -8, 0 8 
             C 20 -8, 8 -20, 0 -12 
             Z" 
          fill="#ffffff" stroke="#ffffff" stroke-width="0.5"/>
    
    <!-- 勾号 -->
    <path d="M -8 4 
             L -2 8 
             L 10 -2" 
          stroke="#ffffff" 
          stroke-width="2" 
          stroke-linecap="round" 
          stroke-linejoin="round" 
          fill="none"/>
  </g>
  
  <!-- 应用名称 -->
  <text x="256" y="380" 
        text-anchor="middle" 
        font-family="Arial, sans-serif" 
        font-size="36" 
        font-weight="bold" 
        fill="#ffffff">
    健康打卡
  </text>
  
  <!-- 装饰性圆点 -->
  <circle cx="100" cy="100" r="12" fill="#ffffff" opacity="0.3"/>
  <circle cx="412" cy="100" r="12" fill="#ffffff" opacity="0.3"/>
  <circle cx="100" cy="412" r="12" fill="#ffffff" opacity="0.3"/>
  <circle cx="412" cy="412" r="12" fill="#ffffff" opacity="0.3"/>
</svg>